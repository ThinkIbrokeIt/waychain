# WayChain — Nginx Configuration
# RPC proxy only. Frontend is served by Vercel.
# Installed at /etc/nginx/sites-available/waychain

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # JSON-RPC proxy to WayChain daemon
    location /rpc {
        proxy_pass http://127.0.0.1:9545/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:9545/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Everything else — not served here
    location / {
        return 404;
    }
}