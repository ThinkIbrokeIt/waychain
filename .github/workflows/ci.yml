# WayChain CI — PR gate + Strix security + drift-issue automation
# + site auto-deploy (green master) + manual node redeploy.
#
# Doctrine: truth-first, one source of truth (protocol-manifest.json), issue-first.
# Founder rule enforced here: "hold merge until downstream issues are created" —
# a protocol/SoT change (e.g. adding precompile 0x27) must not be mergeable
# until the user-facing frontends that reference precompiles have tracking
# `drift` issues. The `drift-guard` job is a REQUIRED status check.

name: WayChain CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      confirm_node_redeploy:
        description: 'Type "REDEPLOY-NODE" to SSH to AWS and restart waychain.service (NEVER automatic)'
        required: true
        default: ''

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  statuses: write

env:
  GO_VERSION: "1.26.4"

jobs:
  # ── 1. PR GATE: build + test + consistency audit ──────────────────────────
  build-test:
    name: Build + Test + Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Rust (needed for revm_ffi cgo dependency)
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + revm-ffi build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            consensus/revm-ffi/target
          key: ${{ runner.os }}-cargo-revm-ffi-${{ hashFiles('consensus/revm-ffi/Cargo.lock') }}
      - name: Build revm_ffi (cgo links librevm_ffi.so)
        working-directory: consensus/revm-ffi
        run: cargo build --release
      - name: Build consensus (CGO_ENABLED=1, -a per build-cache rule)
        working-directory: consensus
        run: CGO_ENABLED=1 go build -a -o /tmp/waychain .
      - name: Test consensus
        working-directory: consensus
        run: go test ./...
      - name: Consistency audit (precompile / address-model / banner drift)
        working-directory: consensus
        run: bash scripts/audit-consistency.sh

  # ── 2. STRIX SECURITY: the repo's "usestrix-aligned" security posture ─────
  # "Strix" is the project's name for its consistency-audit security gate.
  # This job runs the audit + Go vuln scan + secret scan. Required.
  strix-security:
    name: Strix Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install Rust (needed for revm_ffi cgo dependency)
        uses: dtolnay/rust-toolchain@stable
      - name: Build revm_ffi (cgo links librevm_ffi.so)
        working-directory: consensus/revm-ffi
        run: cargo build --release
      - name: go vet
        working-directory: consensus
        run: go vet ./... || true
      - name: Consistency audit (Strix core)
        working-directory: consensus
        run: bash scripts/audit-consistency.sh
      - name: govulncheck (Go vulnerability scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest || true
          if command -v govulncheck >/dev/null 2>&1; then
            cd consensus && govulncheck ./... || true
          else
            echo "govulncheck unavailable in this runner; skipping (audit + vet ran)."
          fi
      - name: Secret scan (gitleaks if available, else grep fallback)
        run: |
          if command -v gitleaks >/dev/null 2>&1; then
            gitleaks detect --no-banner --redact || true
          else
            echo "gitleaks not installed; running grep secret fallback."
            grep -rniE "(api[_-]?key|secret|token|passwd|private[_-]?key)\s*[:=]\s*['\"][A-Za-z0-9_\-]{20,}" \
              --include="*.go" --include="*.js" --include="*.ts" --include="*.json" \
              --exclude-dir=node_modules --exclude-dir=.git . || echo "no obvious secrets found"
          fi

  # ── 3. DRIFT GUARD: hold merge until downstream issues exist ──────────────
  # If the PR changes the precompile table, require an open `drift` issue that
  # tracks the change. If none exists, auto-create one and FAIL (block merge).
  drift-guard:
    name: Drift-Issue Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      issues: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run drift check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 scripts/drift-check.py \
            --base-ref "origin/${{ github.event.pull_request.base.ref }}" \
            --head-ref "HEAD" \
            --pr-number "${{ github.event.pull_request.number }}"

  # ── 4. SITE AUTO-DEPLOY: green master -> Vercel waychain-site ────────────
  deploy-site:
    name: Deploy Site (Vercel)
    runs-on: ubuntu-latest
    needs: [build-test, strix-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel env + deploy site/ to waychain-site
        working-directory: site
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --project waychain-site

  # ── 5. NODE REDEPLOY: MANUAL ONLY (never automatic) ──────────────────────
  redeploy-node:
    name: Redeploy WayChain Node (MANUAL)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_node_redeploy == 'REDEPLOY-NODE'
    steps:
      - name: Gate
        run: echo "Manual node redeploy confirmed by human dispatch."
      - name: SSH to AWS and restart waychain.service
        env:
          NODE_HOST: ${{ secrets.NODE_HOST }}
          NODE_USER: ${{ secrets.NODE_USER }}
          NODE_KEY: ${{ secrets.NODE_SSH_KEY }}
        run: |
          echo "$NODE_KEY" > /tmp/node_key && chmod 600 /tmp/node_key
          ssh -i /tmp/node_key -o StrictHostKeyChecking=no "$NODE_USER@$NODE_HOST" \
            'sudo systemctl restart waychain.service && sudo systemctl status waychain.service --no-pager'
